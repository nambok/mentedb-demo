name: Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://mentedb-prod-demo-frontend --delete
          aws s3 cp frontend/dist/index.html s3://mentedb-prod-demo-frontend/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Deploy CDK (Lambda + infra)
        run: |
          cd infra
          npm ci
          npx cdk deploy --all --require-approval never

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[?contains(@,'demo.mentedb.com')]].Id" --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
