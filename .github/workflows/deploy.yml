name: Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy CDK (infra + Lambda)
        run: |
          cd infra
          npm ci
          npx cdk deploy --all --require-approval never

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Get S3 bucket name from CDK outputs
        id: bucket
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name mentedb-demo-prod \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" --output text)
          echo "name=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.bucket.outputs.name }} --delete
          aws s3 cp frontend/dist/index.html s3://${{ steps.bucket.outputs.name }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?contains(@,'demo.mentedb.com')]].Id" \
            --output text)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi
